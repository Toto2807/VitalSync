name: CI/CD VitalSync

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run ESLint
        working-directory: backend
        run: |
          npx eslint@8 server.js --no-eslintrc --rule "{\"no-unused-vars\": \"warn\"}"

      - name: Run tests
        run: npm test
        working-directory: backend

  build-and-push:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/vitalsync-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/vitalsync-frontend:${{ github.sha }}

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Start services with Docker Compose
        run: |
          POSTGRES_DB=vitalsync \
          POSTGRES_USER=vitalsync_user \
          POSTGRES_PASSWORD=testpassword \
          docker-compose up -d --build

      - name: Wait for backend to start
        run: sleep 10

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed"

      - name: Tear down
        run: docker-compose down