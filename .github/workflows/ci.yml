name: CI/CD VitalSync

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Run tests
        run: npm test
        working-directory: backend

  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Utilisation du tag 'latest' en plus du SHA pour plus de simplicité
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vitalsync-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/vitalsync-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vitalsync-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/vitalsync-frontend:${{ github.sha }}

  deploy-staging:
    name: Simulation Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Check Deployment Status
        run: echo "Images pushed to Docker Hub. Ready for Kubernetes deployment."